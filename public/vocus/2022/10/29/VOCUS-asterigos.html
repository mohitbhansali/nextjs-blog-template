<meta name="description" content="《Asterigos：失落迷城》宣傳圖 《Asterigos：失落迷城》（Asterigos: Curse Of The Stars）是一款由臺灣遊戲團隊「艾可米遊戲」（Acme Gamestudio）所研發製作的遊戲，於今年十月上市，在各大遊戲平台上皆可遊玩；與過去的本土獨立遊戲不同，這款遊戲在預告、宣傳上都展現出某種「３Ａ遊戲」的氣場與氛圍，我個人也因為本作編劇為月亮熊老師而對此深感興趣。 &lt;/div&gt; 《Asterigos：失落迷城》以古希臘羅馬文明為創作藍本，講述來自安貝里的主角「希爾妲」（Hilda），為了尋找北風軍團（Northwind Legion）的下落而來到受千年詛咒的城市亞弗斯（Aphes）；除了掛心於身為軍團長的父親外，同為軍團戰士的希爾妲也同樣擔心其他的弟兄們是否安好。 隨著希爾妲深入城市，他也逐漸認識亞弗斯的文化、社會、階級發展；與概念來自於中古英格蘭的安貝里不同，亞弗斯在各種層面上或許都比安貝里來得更加先進——社會體制、民主制度、階級流動，以及遊戲中最重要的魔法發展，都比安貝里來得進步（但遊戲其實對於主角故鄉的著墨較少）。然而，因為歷經千年的詛咒，亞弗斯的人民陷入長生不老的「困境」中，時不知味、度日如年，只能靠著只有單一礦源的魔法星石打磨的「星塵」果腹充飢。與此同時，亞弗斯也因為這樣的詛咒，千年以來未再有所發展，整座城市陷入故步自封、沉淪頹喪的境地。 希爾妲，以及先進入亞弗斯的北風軍團打破了這座城市的安寧，在部分居民試圖打破詛咒、部分人民試圖維持現狀，還有不同層級的社群因為他們的進入而被破壞了平衡的狀況下，希爾妲的作為會如何改變亞弗斯的未來——這便是遊戲的故事核心。 希爾妲 關於遊戲玩法、難度、操作上的分析與評價，網路上已經有不少文章、資料、討論可以參考；我個人對遊戲所在意的重點，一直都是故事的呈現與深度。因此，請讓我在接下來的文章內容中以此為焦點。 ★下文涉及Asterigos遊戲部分劇情，請斟酌閱讀 我在遊戲玩到中前期的時候，開始感覺到遊戲有很濃厚的「臺灣味」；這指的並非台詞寫得很「臺」、或者在畫面設計上有什麼臺灣色彩——而是，遊戲的時空背景即便是以歐美大眾較為熟悉的古希臘羅馬文化為設計基底，卻在很多層面上映照著臺灣自身的歷史。 最明顯的部分，就是亞弗斯因為這場不明的詛咒，進入了長達千年的「戒嚴令」。要提到戒嚴，臺灣人肯定不陌生，畢竟我們擁有史上第二長的戒嚴時期（註１）；這場戒嚴名義上是為了「保密防諜」，穩定臺灣局勢，然而除此之外，黨國政府也因為大權在握，在社會各個層面上剷除異己，一整代的所謂本省菁英消失無蹤，就連同樣是同黨的改革派也不放過。 遊戲中，千年的戒嚴期間，詛咒產生的究責、政府角力的影響、維持礦源的努力，也同樣造成了亞弗斯人民的人心惶惶。貧民居住的區域「黑街」受到幫派勢力的控制；公民居住的「雅格市街」受到異端教派的入侵；擁有星石礦脈的「繁星礦坑」受到來自地底的不明耳語侵擾；受到軍事執政官掌控的「法蘭學院」，網羅並壓榨大量工匠，要他們沒日沒夜地製造星塵供給全市；因為河道入侵而成為沼澤地的「水沒市郊」中，內務執政官被自己的護衛長軟禁在神殿之中；貴族居住的「雅格大道」上，人們繼續維持著上流社會的生活習慣，只為了讓自己能夠在千百年間保持理智；關押大量思想犯的「冥河監獄」，則在宗教執政官的帶領下，默默進行著慘無人道的人體實驗…… 說起來，遊戲中的每一個區域、每一個情境，似乎都能找到與臺灣現實有所連結的隱喻及暗示；但除此之外，或許我們也能說，這樣的議題都能夠在世界各地找到類似案例。 這遊戲的寶箱怪多到不行w 然而——我要來講一些我個人不是很滿意的地方了——《Asterigos：失落迷城》在故事劇情上，有相當強烈的「說教味」。作為一名《最後生還者２》的支持玩家，我其實並不抗拒遊戲或故事中的「說教」；但要說得對、說得讓人（我）聽得進去，是需要技巧的（當然，也有說教說得對不對的問題）。我在打敗遊戲的第一個王，黑街的巴拉德之後，就開始不斷感到一種在進行其他遊戲不曾有過的違和感。直到進入格雅大道，打敗並殺死軍事執政官瑪波爾之後，我終於確定了自己為何會有這種感覺： 在《Asterigos：失落迷城》中，希爾妲的行動幾乎沒有被稱許過。當他打倒意欲殺害自己的巴拉德後，遺民中的每個成員都責怪他過於衝動；當他打敗不願放過他而主動應戰的瑪波爾後，在場的每個人都詫異他怎可將軍事執政官殺死。甚至，在前往天岳的路途上，當希爾妲遇到了光輝地脈中的自由派學士，後者呼籲主角別傷害傳說中守護亞弗斯的雷獸帕拉斯後，希爾妲依舊殺死了帕拉斯，並默默將帕拉斯最後殘留的毛髮送給對方以供研究……我覺得，這些譴責與訓斥並非無病呻吟、不具意義；但遊戲實際上並沒有給予玩家任何「選擇」，我不能不殺巴拉德、不能不殺瑪波爾，遊戲並沒有給予我不殺的選項，卻譴責我做出我唯一能做的行為，這對我來說，十分莫名。 為了取得高能聚焦透鏡，希爾妲進入法蘭學院探詢；在面對百夫長與巨像兵的前一刻，玩家其實有機會找到被關押在牢房中的囚犯們，實際上卻沒有任何辦法可以率先救出他們，只能等到與百夫長遭遇之後，再眼睜睜地看著他們被處以「星塵之刑」，被處死後化為星塵，作為發動聚焦透鏡的能量來源。 像這樣的安排在遊戲中比比皆是，是少數讓我覺得「打敗敵人卻沒有任何愉悅」的遊戲；換句話說，實際上是遊戲引導我「犯錯」，讓我「被罵」，而不是我自己的選擇，即便我預判了你的預判，想在打百夫長之前救出囚犯、想要留手不殺敵人，遊戲也不讓我這麼做——然後，遊戲再來批判你，說你莽撞地破壞了黑街的權力平衡、殺害了掌握權力的有能者、害死了一群實際上可能抱持冤罪的犯人……我對於這樣的說教方式，有點不以為然。 一般結局中米奈娃的選擇 話說回來，即便如此，我還是被故事的結局給打動了。雖然遊戲有另一個「重返榮耀」的結局，但我覺得我玩到的這個「一般」結局更給我一種「豈能盡如人意」的、未竟的美感。具有良善初衷的歐墨尼德被米奈娃從星穹之核中救出，兩人一同被流放出亞弗斯，活著為自己所犯下的過錯贖罪（重返榮耀結局裡，歐墨尼德被重新封印進核中，米奈娃則成為亞弗斯的新任執政官）——說起來，這樣的終局，多少也帶著一點廢死精神。 整體而言，我依然覺得《Asterigos：失落迷城》是一款優秀的遊戲。衝動的主角闖入亞弗斯的過程中犯錯、學習、成長，最終改變亞弗斯的命運；而亞弗斯千年不變的命數，也因為希爾妲的年輕莽撞，迸發出新的機會與道路。實際上——雖然遊戲到了最後也沒有明說，但——希爾妲應該也是在千年前離開亞弗斯的族人後代，甚至可能是米奈娃的哥哥的後代吧！ 我還沒拿到月亮熊老師寫的前傳小說《Asterigos失落迷城：星殞將至》。或許之後有機會的話，再來寫前傳小說的相關心得～ 註１：臺灣戒嚴長達三十八年（1949-1987）；而敘利亞則擁有最長的四十八年戒嚴期（1963-2011）" />

稱許過。當他打倒意欲殺害自己的巴拉德後，遺民中的每個成員都責怪他過於衝動；當他打敗不願放過他而主動應戰的瑪波爾後，在場的每個人都詫異他怎可將軍事執政官殺死。甚至，在前往天岳的路途上，當希爾妲遇到了光輝地脈中的自由派學士，後者呼籲主角別傷害傳說中守護亞弗斯的雷獸帕拉斯後，希爾妲依舊殺死了帕拉斯，並默默將帕拉斯最後殘留的毛髮送給對方以供研究……我覺得，這些譴責與訓斥並非無病呻吟、不具意義；但遊戲實際上並沒有給予玩家任何「選擇」，我不能不殺巴拉德、不能不殺瑪波爾，遊戲並沒有給予我不殺的選項，卻譴責我做出我唯一能做的行為，這對我來說，十分莫名。 為了取得高能聚焦透鏡，希爾妲進入法蘭學院探詢；在面對百夫長與巨像兵的前一刻，玩家其實有機會找到被關押在牢房中的囚犯們，實際上卻沒有任何辦法可以率先救出他們，只能等到與百夫長遭遇之後，再眼睜睜地看著他們被處以「星塵之刑」，被處死後化為星塵，作為發動聚焦透鏡的能量來源。 像這樣的安排在遊戲中比比皆是，是少數讓我覺得「打敗敵人卻沒有任何愉悅」的遊戲；換句話說，實際上是遊戲引導我「犯錯」，讓我「被罵」，而不是我自己的選擇，即便我預判了你的預判，想在打百夫長之前救出囚犯、想要留手不殺敵人，遊戲也不讓我這麼做——然後，遊戲再來批判你，說你莽撞地破壞了黑街的權力平衡、殺害了掌握權力的有能者、害死了一群實際上可能抱持冤罪的犯人……我對於這樣的說教方式，有點不以為然。 一般結局中米奈娃的選擇 話說回來，即便如此，我還是被故事的結局給打動了。雖然遊戲有另一個「重返榮耀」的結局，但我覺得我玩到的這個「一般」結局更給我一種「豈能盡如人意」的、未竟的美感。具有良善初衷的歐墨尼德被米奈娃從星穹之核中救出，兩人一同被流放出亞弗斯，活著為自己所犯下的過錯贖罪（重返榮耀結局裡，歐墨尼德被重新封印進核中，米奈娃則成為亞弗斯的新任執政官）——說起來，這樣的終局，多少也帶著一點廢死精神。 整體而言，我依然覺得《Asterigos：失落迷城》是一款優秀的遊戲。衝動的主角闖入亞弗斯的過程中犯錯、學習、成長，最終改變亞弗斯的命運；而亞弗斯千年不變的命數，也因為希爾妲的年輕莽撞，迸發出新的機會與道路。實際上——雖然遊戲到了最後也沒有明說，但——希爾妲應該也是在千年前離開亞弗斯的族人後代，甚至可能是米奈娃的哥哥的後代吧！ 我還沒拿到月亮熊老師寫的前傳小說《Asterigos失落迷城：星殞將至》。或許之後有機會的話，再來寫前傳小說的相關心得～ 註１：臺灣戒嚴長達三十八年（1949-1987）；而敘利亞則擁有最長的四十八年戒嚴期（1963-2011）","author":{"@type":"Person","name":"馬立"},"@type":"BlogPosting","url":"https://agora0.gitlab.io/blog/vocus/2022/10/29/VOCUS-asterigos.html","@context":"https://schema.org"}</script>

    <div class="draft--imgNormal draft-block"><div><img src="https://images.vocus.cc/ad1d8be5-50bf-449b-ab27-c3d883adead6.jpg"><figcaption class="imageCaption draft-block" style="cursor:text;display:block">《Asterigos：失落迷城》宣傳圖</figcaption></div></div>
<div class="draft-block draft--p left">《Asterigos：失落迷城》（Asterigos: Curse Of The Stars）是一款由臺灣遊戲團隊「艾可米遊戲」（Acme Gamestudio）所研發製作的遊戲，於今年十月上市，在各大遊戲平台上皆可遊玩；與過去的本土獨立遊戲不同，這款遊戲在預告、宣傳上都展現出某種「３Ａ遊戲」的氣場與氛圍，我個人也因為本作編劇為月亮熊老師而對此深感興趣。</div>
<div><iframe allowfullscreen src="https://www.youtube.com/embed/-Cun756o5Ms"></div>
<div class="draft-block draft--p left">《Asterigos：失落迷城》以古希臘羅馬文明為創作藍本，講述來自安貝里的主角「希爾妲」（Hilda），為了尋找北風軍團（Northwind Legion）的下落而來到受千年詛咒的城市亞弗斯（Aphes）；除了掛心於身為軍團長的父親外，同為軍團戰士的希爾妲也同樣擔心其他的弟兄們是否安好。</div>
<div class="draft-block draft--p left">隨著希爾妲深入城市，他也逐漸認識亞弗斯的文化、社會、階級發展；與概念來自於中古英格蘭的安貝里不同，亞弗斯在各種層面上或許都比安貝里來得更加先進——社會體制、民主制度、階級流動，以及遊戲中最重要的魔法發展，都比安貝里來得進步（但遊戲其實對於主角故鄉的著墨較少）。然而，因為歷經千年的詛咒，亞弗斯的人民陷入長生不老的「困境」中，時不知味、度日如年，只能靠著只有單一礦源的魔法星石打磨的「星塵」果腹充飢。與此同時，亞弗斯也因為這樣的詛咒，千年以來未再有所發展，整座城市陷入故步自封、沉淪頹喪的境地。</div>
<div class="draft-block draft--p left">希爾妲，以及先進入亞弗斯的北風軍團打破了這座城市的安寧，在部分居民試圖打破詛咒、部分人民試圖維持現狀，還有不同層級的社群因為他們的進入而被破壞了平衡的狀況下，希爾妲的作為會如何改變亞弗斯的未來——這便是遊戲的故事核心。</div>
<div class="draft--imgNormal draft-block"><div><img src="https://images.vocus.cc/e3b9f8c7-f773-44e5-bacf-476f3b5c3b53.jpg"><figcaption class="imageCaption draft-block" style="cursor:text;display:block">希爾妲</figcaption></div></div>
<div class="draft-block draft--p left">關於遊戲玩法、難度、操作上的分析與評價，網路上已經有不少文章、資料、討論可以參考；我個人對遊戲所在意的重點，一直都是故事的呈現與深度。因此，請讓我在接下來的文章內容中以此為焦點。</div>
<div class="draft-block draft--p left">★下文涉及Asterigos遊戲部分劇情，請斟酌閱讀</div>
<div class="draft-block draft--p left">我在遊戲玩到中前期的時候，開始感覺到遊戲有很濃厚的「臺灣味」；這指的並非台詞寫得很「臺」、或者在畫面設計上有什麼臺灣色彩——而是，遊戲的時空背景即便是以歐美大眾較為熟悉的古希臘羅馬文化為設計基底，卻在很多層面上映照著臺灣自身的歷史。</div>
<div class="draft-block draft--p left">最明顯的部分，就是亞弗斯因為這場不明的詛咒，進入了長達千年的「戒嚴令」。要提到戒嚴，臺灣人肯定不陌生，畢竟我們擁有史上第二長的戒嚴時期（註１）；這場戒嚴名義上是為了「保密防諜」，穩定臺灣局勢，然而除此之外，黨國政府也因為大權在握，在社會各個層面上剷除異己，一整代的所謂本省菁英消失無蹤，就連同樣是同黨的改革派也不放過。</div>
<div class="draft-block draft--p left">遊戲中，千年的戒嚴期間，詛咒產生的究責、政府角力的影響、維持礦源的努力，也同樣造成了亞弗斯人民的人心惶惶。貧民居住的區域「黑街」受到幫派勢力的控制；公民居住的「雅格市街」受到異端教派的入侵；擁有星石礦脈的「繁星礦坑」受到來自地底的不明耳語侵擾；受到軍事執政官掌控的「法蘭學院」，網羅並壓榨大量工匠，要他們沒日沒夜地製造星塵供給全市；因為河道入侵而成為沼澤地的「水沒市郊」中，內務執政官被自己的護衛長軟禁在神殿之中；貴族居住的「雅格大道」上，人們繼續維持著上流社會的生活習慣，只為了讓自己能夠在千百年間保持理智；關押大量思想犯的「冥河監獄」，則在宗教執政官的帶領下，默默進行著慘無人道的人體實驗……</div>
<div class="draft-block draft--p left">說起來，遊戲中的每一個區域、每一個情境，似乎都能找到與臺灣現實有所連結的隱喻及暗示；但除此之外，或許我們也能說，這樣的議題都能夠在世界各地找到類似案例。</div>
<div class="draft--imgNormal draft-block"><div><img src="https://images.vocus.cc/2696f8b1-3706-4b3c-83e4-2478b4a3ccab.jpg"><figcaption class="imageCaption draft-block" style="cursor:text;display:block">這遊戲的寶箱怪多到不行w</figcaption></div></div>
<div class="draft-block draft--p left">然而——我要來講一些我個人不是很滿意的地方了——《Asterigos：失落迷城》在故事劇情上，有相當強烈的「說教味」。作為一名《最後生還者２》的支持玩家，我其實並不抗拒遊戲或故事中的「說教」；但要說得對、說得讓人（我）聽得進去，是需要技巧的（當然，也有說教說得對不對的問題）。我在打敗遊戲的第一個王，黑街的巴拉德之後，就開始不斷感到一種在進行其他遊戲不曾有過的違和感。直到進入格雅大道，打敗並殺死軍事執政官瑪波爾之後，我終於確定了自己為何會有這種感覺：</div>
<div class="draft-block draft--p left">在《Asterigos：失落迷城》中，希爾妲的行動幾乎沒有被稱許過。當他打倒意欲殺害自己的巴拉德後，遺民中的每個成員都責怪他過於衝動；當他打敗不願放過他而主動應戰的瑪波爾後，在場的每個人都詫異他怎可將軍事執政官殺死。甚至，在前往天岳的路途上，當希爾妲遇到了光輝地脈中的自由派學士，後者呼籲主角別傷害傳說中守護亞弗斯的雷獸帕拉斯後，希爾妲依舊殺死了帕拉斯，並默默將帕拉斯最後殘留的毛髮送給對方以供研究……我覺得，這些譴責與訓斥並非無病呻吟、不具意義；但遊戲實際上並沒有給予玩家任何「選擇」，我不能不殺巴拉德、不能不殺瑪波爾，遊戲並沒有給予我不殺的選項，卻譴責我做出我唯一能做的行為，這對我來說，十分莫名。</div>
<div class="draft-block draft--p left">為了取得高能聚焦透鏡，希爾妲進入法蘭學院探詢；在面對百夫長與巨像兵的前一刻，玩家其實有機會找到被關押在牢房中的囚犯們，實際上卻沒有任何辦法可以率先救出他們，只能等到與百夫長遭遇之後，再眼睜睜地看著他們被處以「星塵之刑」，被處死後化為星塵，作為發動聚焦透鏡的能量來源。</div>
<div class="draft-block draft--p left">像這樣的安排在遊戲中比比皆是，是少數讓我覺得「打敗敵人卻沒有任何愉悅」的遊戲；換句話說，實際上是遊戲引導我「犯錯」，讓我「被罵」，而不是我自己的選擇，即便我預判了你的預判，想在打百夫長之前救出囚犯、想要留手不殺敵人，遊戲也不讓我這麼做——然後，遊戲再來批判你，說你莽撞地破壞了黑街的權力平衡、殺害了掌握權力的有能者、害死了一群實際上可能抱持冤罪的犯人……我對於這樣的說教方式，有點不以為然。</div>
<div class="draft--imgNormal draft-block"><div><img src="https://images.vocus.cc/2adfef7d-deb3-404c-86a8-54effecc16c7.png"><figcaption class="imageCaption draft-block" style="cursor:text;display:block">一般結局中米奈娃的選擇</figcaption></div></div>
<div class="draft-block draft--p left">話說回來，即便如此，我還是被故事的結局給打動了。雖然遊戲有另一個「重返榮耀」的結局，但我覺得我玩到的這個「一般」結局更給我一種「豈能盡如人意」的、未竟的美感。具有良善初衷的歐墨尼德被米奈娃從星穹之核中救出，兩人一同被流放出亞弗斯，活著為自己所犯下的過錯贖罪（重返榮耀結局裡，歐墨尼德被重新封印進核中，米奈娃則成為亞弗斯的新任執政官）——說起來，這樣的終局，多少也帶著一點廢死精神。</div>
<div class="draft-block draft--p left">整體而言，我依然覺得《Asterigos：失落迷城》是一款優秀的遊戲。衝動的主角闖入亞弗斯的過程中犯錯、學習、成長，最終改變亞弗斯的命運；而亞弗斯千年不變的命數，也因為希爾妲的年輕莽撞，迸發出新的機會與道路。實際上——雖然遊戲到了最後也沒有明說，但——希爾妲應該也是在千年前離開亞弗斯的族人後代，甚至可能是米奈娃的哥哥的後代吧！</div>
<div class="draft-block draft--p left">我還沒拿到月亮熊老師寫的前傳小說《Asterigos失落迷城：星殞將至》。或許之後有機會的話，再來寫前傳小說的相關心得～</div>
<div class="draft-block draft--p left">註１：臺灣戒嚴長達三十八年（1949-1987）；而敘利亞則擁有最長的四十八年戒嚴期（1963-2011）</div>
