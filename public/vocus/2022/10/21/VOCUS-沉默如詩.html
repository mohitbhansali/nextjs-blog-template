    <h1 class="post-title p-name" itemprop="name headline">沉默如詩</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2022-10-21T16:33:26+08:00" itemprop="datePublished">Oct 21, 2022
      </time>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">直樹的流浪之歌</span></span></p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    <div class="draft-block draft--p left">沉默如詩<br>時間是敘事的主體<br>意識在河流裡奔湧<br>風在風中陪伴沉默<br>陪伴如畫的傷痛</div>
<div class="draft-block draft--p left">指針走往一個方向<br>生活的軸<br>是追逐亦或跟上<br>是凌亂亦或安適<br>是命定亦或抉擇<br>任由它旋轉 跳躍</div>
<div class="draft-block draft--p left">日子成了穿刺的強光<br>我們是影 是輪廓<br>是闔上雙眼<br>不曾褪色的夢<br>專挑屋簷底下埋伏<br>等待光的殞落</div>
<div class="draft-block draft--p left">蕭瑟用灰色傾訴<br>一年將盡<br>更迭復始的步伐<br>只聞其聲</div>
<div class="draft-block draft--p left">沉默如詩<br>你是時間的煮人</div>
