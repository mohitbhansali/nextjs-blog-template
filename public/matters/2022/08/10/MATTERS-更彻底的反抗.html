  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">更彻底的反抗</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2022-08-10T23:19:47+08:00" itemprop="datePublished">Aug 10, 2022
      </time>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">吐冷</span></span></p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    <p>与朋友聊天说，今夜中国依然没有伊藤诗织，不用跟欧美比，东亚三国父权大本营我们也绝对垫底。中国特色的艰难在于，爹与高墙根本融为一体，没有单独反抗一个爹的可能。但也许这正是更大的希望所在，我们要反抗就势必要进行更彻底的反抗。</p><p>“弦子与她的朋友们”是中文互联网最好的一个网名，与梨花女大“姐姐来了”一样，我们永远能以弦子的朋友的身份相认。</p>

</article>
