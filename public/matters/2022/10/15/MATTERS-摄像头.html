    <h1 class="post-title p-name" itemprop="name headline">摄像头</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="2022-10-15T19:32:26+08:00" itemprop="datePublished">Oct 15, 2022
      </time>• <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span class="p-author h-card" itemprop="name">鬼撞墙</span></span></p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    <p>深夜的村庄，</p><p>忙完秋收的村民已经入睡。</p><p>我独自走在空荡荡的街道上，</p><p>轻轻的脚步声，</p><p>惊动了邻居那只</p><p>永远不遛的小狗。</p><p>一个个摄像头，</p><p>睁着发红的眼睛，</p><p>恶狠狠地瞪着每一条街巷，</p><p>我注视着那一双双红眼，</p><p>仿佛看到了那个即将窃走未来五年……</p><p>也许是十年二十年……</p><p>的窃国大盗，</p><p>睁大了同样的红眼，</p><p>寝食难安，夜不成寐。</p><p><br></p><p><br></p>

  </div><a class="u-url" href="/blog/matters/2022/10/15/MATTERS-%E6%91%84%E5%83%8F%E5%A4%B4.html" hidden></a>
