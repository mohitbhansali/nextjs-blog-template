    <figcaption><span></span></figcaption></figure><p>以英文字母為設計主軸的作品，簡約易配搭。</p><p>左邊一條用上 Swarovski 的配襯水晶，在高貴之下也不俗氣。</p><p>右邊一條的設計概念是經緯度意念，用上月亮令產品更具「天文學」之感。</p><p>金飾都皆是用上14K包金，鑽飾是鋯石一類。</p>
